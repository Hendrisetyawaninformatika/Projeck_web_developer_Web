<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | WebDevPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            overflow-x: hidden;
        }

        /* ===== PARTICLES BACKGROUND ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(245, 176, 20, 0.08);
            border-radius: 50%;
            animation: floatParticle 20s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 25s; width: 15px; height: 15px; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 20s; width: 8px; height: 8px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 4s; animation-duration: 28s; width: 12px; height: 12px; }
        .particle:nth-child(4) { left: 50%; animation-delay: 1s; animation-duration: 22s; width: 18px; height: 18px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 3s; animation-duration: 26s; width: 10px; height: 10px; }
        .particle:nth-child(6) { left: 80%; animation-delay: 5s; animation-duration: 24s; width: 14px; height: 14px; }
        .particle:nth-child(7) { left: 90%; animation-delay: 1.5s; animation-duration: 21s; width: 9px; height: 9px; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== AUTH CONTAINER ===== */
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            min-height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            z-index: 1;
            margin: 2rem auto;
        }

        /* ===== LEFT SIDE - ANIMASI DEVELOPER ===== */
        .auth-left {
            flex: 1;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }

        /* Animasi Background */
        .auth-left::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(245, 176, 20, 0.08) 0%, transparent 60%);
            animation: pulseGlow 6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Animasi Bintang Jatuh */
        .auth-left .stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .auth-left .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: starFall linear infinite;
        }
        .auth-left .star:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .auth-left .star:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; width: 4px; height: 4px; }
        .auth-left .star:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; }
        .auth-left .star:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; width: 5px; height: 5px; }
        .auth-left .star:nth-child(5) { left: 70%; animation-duration: 9s; animation-delay: 3s; }
        .auth-left .star:nth-child(6) { left: 85%; animation-duration: 11s; animation-delay: 5s; width: 4px; height: 4px; }
        .auth-left .star:nth-child(7) { left: 50%; animation-duration: 13s; animation-delay: 7s; width: 6px; height: 6px; }

        @keyframes starFall {
            0% { transform: translateY(-20px) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(10px) translateX(5px) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(-20px) scale(0.5); opacity: 0; }
        }

        /* Animasi Developer */
        .developer-animation {
            position: relative;
            z-index: 1;
            text-align: center;
            margin: 20px 0;
        }
        .developer-animation .code-icon {
            font-size: 60px;
            display: inline-block;
            animation: floatCode 3s ease-in-out infinite;
        }
        @keyframes floatCode {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .developer-animation .typing-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 10px;
            border-right: 2px solid #f5b014;
            padding-right: 8px;
            display: inline-block;
            animation: blinkCursor 0.8s step-end infinite;
        }
        @keyframes blinkCursor {
            50% { border-color: transparent; }
        }

        .code-lines {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            margin-top: 10px;
        }
        .code-lines .line {
            height: 3px;
            background: linear-gradient(90deg, rgba(245, 176, 20, 0.6), rgba(245, 176, 20, 0.1));
            border-radius: 4px;
            animation: lineSlide 4s ease-in-out infinite;
        }
        .code-lines .line:nth-child(1) { width: 80%; animation-delay: 0s; }
        .code-lines .line:nth-child(2) { width: 60%; animation-delay: 0.8s; }
        .code-lines .line:nth-child(3) { width: 90%; animation-delay: 1.6s; }
        .code-lines .line:nth-child(4) { width: 50%; animation-delay: 2.4s; }
        .code-lines .line:nth-child(5) { width: 70%; animation-delay: 3.2s; }

        @keyframes lineSlide {
            0%, 100% { opacity: 0.3; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.05); }
        }

        .auth-left::after {
            content: '</>';
            position: absolute;
            font-size: 200px;
            opacity: 0.03;
            bottom: -60px;
            right: -30px;
            font-weight: 800;
            color: #f5b014;
            z-index: 0;
            animation: rotateCode 20s linear infinite;
        }
        @keyframes rotateCode {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auth-brand {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 1rem;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: inline-block;
            letter-spacing: -1px;
        }

        .logo span {
            color: #f5b014;
        }

        .auth-brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
            max-width: 280px;
            margin: 4px auto 0;
            line-height: 1.6;
        }

        .auth-left-bottom {
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }
        .auth-left-bottom .features {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .auth-left-bottom .features span {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
        }
        .auth-left-bottom .features span:nth-child(1) { animation-delay: 0.2s; }
        .auth-left-bottom .features span:nth-child(2) { animation-delay: 0.4s; }
        .auth-left-bottom .features span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-left-bottom .features span svg {
            stroke: #f5b014;
        }

        /* ===== RIGHT SIDE ===== */
        .auth-right {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            overflow-y: auto;
            max-height: 90vh;
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .form-header h1 span {
            color: #f5b014;
        }

        .form-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        /* ===== FORM ===== */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .required {
            color: #ef4444;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg:first-child {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 50px 12px 44px;
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            background: #fafcff;
            font-size: 14px;
            transition: all 0.25s;
            outline: none;
            font-family: inherit;
            color: #1e293b;
        }

        .input-wrapper input:focus {
            border-color: #f5b014;
            box-shadow: 0 0 0 4px rgba(245, 176, 20, 0.12);
            background: #fff;
        }

        .input-wrapper input:focus + svg {
            color: #f5b014;
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
        }

        .input-wrapper input[type="tel"] {
            padding-left: 1rem;
        }

        /* ===== TOGGLE PASSWORD ===== */
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #94a3b8;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .toggle-password:hover {
            color: #f5b014;
            background: rgba(245, 176, 20, 0.08);
        }
        .toggle-password.active {
            color: #f5b014;
        }

        /* ===== PASSWORD STRENGTH ===== */
        .password-strength {
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }
        .password-strength.show {
            display: block;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            border-radius: 4px;
            transition: all 0.4s ease;
        }
        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 4px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* ===== CHECKBOX ===== */
        .checkbox-group {
            margin-top: 0.25rem;
        }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: #64748b;
            line-height: 1.5;
        }

        .checkbox-label input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            margin-top: 1px;
        }

        .checkbox-label input[type="checkbox"]:checked {
            background: #f5b014;
            border-color: #f5b014;
        }

        .checkbox-label input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: #0f172a;
            font-size: 13px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checkbox-label a {
            color: #f5b014;
            text-decoration: none;
            font-weight: 600;
        }
        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 40px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f5b014, #d49a0e);
            color: #0f172a;
            box-shadow: 0 6px 20px rgba(245, 176, 20, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(245, 176, 20, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(15, 23, 42, 0.2);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== DIVIDER ===== */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }

        /* ===== GOOGLE BUTTON ===== */
        .btn-google {
            background: white;
            color: #1e293b;
            border: 1.5px solid #e2e8f0;
            font-weight: 500;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #f5b014;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .btn-google svg {
            flex-shrink: 0;
        }

        /* ===== FOOTER ===== */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #f5b014;
            text-decoration: none;
            font-weight: 700;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            animation: slideInRight 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .toast.hide {
            animation: slideOutRight 0.4s ease forwards;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .auth-container {
                flex-direction: column;
                margin: 0;
                min-height: 100vh;
                border-radius: 0;
            }
            .auth-left {
                padding: 2rem;
                min-height: 280px;
            }
            .developer-animation .code-icon {
                font-size: 40px;
            }
            .code-lines {
                display: none;
            }
            .auth-left .stars {
                display: none;
            }
            .auth-right {
                padding: 2rem;
                max-height: none;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .auth-left {
                min-height: 220px;
                padding: 1.5rem;
            }
            .logo {
                font-size: 2rem;
            }
            .form-header h1 {
                font-size: 1.5rem;
            }
            .developer-animation .code-icon {
                font-size: 30px;
            }
            .developer-animation .typing-text {
                font-size: 11px;
            }
            .auth-right {
                padding: 1.5rem;
            }
            .auth-left-bottom .features {
                gap: 12px;
            }
            .auth-left-bottom .features span {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== PARTICLES BACKGROUND ===== -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="auth-container">
        <!-- ===== LEFT SIDE - ANIMASI DEVELOPER ===== -->
        <div class="auth-left">
            <!-- Stars Animation -->
            <div class="stars">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>

            <div class="auth-brand">
                <a href="index.html" class="logo">Web<span>Dev</span>Pro</a>
                <p>Bergabunglah dan mulai perjalanan digital Anda</p>
            </div>

            <!-- Developer Animation -->
            <div class="developer-animation">
                <div class="code-icon">💻</div>
                <div class="typing-text">Web Developer &amp; Designer</div>
                <div class="code-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>

            <div class="auth-left-bottom">
                <div class="features">
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12" /></svg>
                        Terpercaya
                    </span>
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
                        Aman
                    </span>
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></svg>
                        24/7 Support
                    </span>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT SIDE - FORM ===== -->
        <div class="auth-right">
            <div class="auth-form-wrapper">
                <div class="form-header">
                    <h1>Buat Akun <span>Baru</span></h1>
                    <p>Daftar gratis dan mulai proyek digital Anda sekarang juga</p>
                </div>

                <form id="registerForm" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nama">Nama Lengkap <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                                <input type="text" id="nama" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="telepon">Nomor Telepon</label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                                <input type="tel" id="telepon" placeholder="+62 8xx-xxxx-xxxx">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <input type="email" id="email" placeholder="nama@email.com" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
                                <button type="button" class="toggle-password" id="togglePassword1" aria-label="Toggle password visibility">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                </button>
                            </div>
                            <div class="password-strength" id="passwordStrength">
                                <div class="password-strength-bar" id="strengthBar"></div>
                            </div>
                            <div class="password-strength-text" id="strengthText"></div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Konfirmasi Password <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                </svg>
                                <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
                                <button type="button" class="toggle-password" id="togglePassword2" aria-label="Toggle password visibility">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="setuju" required>
                            <span>Saya menyetujui <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> WebDevPro</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="registerSubmit">
                        <span>Daftar Sekarang</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>atau daftar dengan</span>
                </div>

                <button class="btn btn-google btn-block" id="googleRegisterBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>

                <p class="auth-footer">
                    Sudah punya akun? <a href="login.html">Masuk di sini</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ===== TOAST NOTIFICATION ===== -->
    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================
        function setupPasswordToggle(toggleId, inputId) {
            const toggleBtn = document.getElementById(toggleId);
            const passwordInput = document.getElementById(inputId);

            toggleBtn.addEventListener('click', function() {
                const isPasswordVisible = passwordInput.type === 'text';
                passwordInput.type = isPasswordVisible ? 'password' : 'text';

                const svg = this.querySelector('svg');
                if (passwordInput.type === 'text') {
                    svg.innerHTML = `
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    `;
                    this.classList.add('active');
                } else {
                    svg.innerHTML = `
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    `;
                    this.classList.remove('active');
                }
            });
        }

        // Setup both password toggles
        setupPasswordToggle('togglePassword1', 'password');
        setupPasswordToggle('togglePassword2', 'confirmPassword');

        // ============================================
        // PASSWORD STRENGTH CHECKER
        // ============================================
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            const strengthContainer = document.getElementById('passwordStrength');

            if (password.length === 0) {
                strengthContainer.classList.remove('show');
                return;
            }

            strengthContainer.classList.add('show');

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const colors = ['#ef4444', '#f59e0b', '#f59e0b', '#10b981', '#10b981'];
            const texts = ['Password Lemah', 'Cukup', 'Baik', 'Kuat', 'Sangat Kuat'];
            const widths = ['20%', '40%', '60%', '80%', '100%'];

            const level = Math.min(strength - 1, 4);
            strengthBar.style.width = widths[level] || '0%';
            strengthBar.style.background = colors[level] || '#ef4444';
            strengthText.textContent = texts[level] || '';
            strengthText.style.color = colors[level] || '#ef4444';
        });

        // ============================================
        // TOAST NOTIFICATION
        // ============================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================
        // REGISTER FORM
        // ============================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const telepon = document.getElementById('telepon').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const setuju = document.getElementById('setuju').checked;
            const submitBtn = document.getElementById('registerSubmit');

            if (!nama || !email || !password) {
                showToast('Semua field wajib diisi!', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Password tidak cocok!', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter!', 'error');
                document.getElementById('password').focus();
                return;
            }

            if (!setuju) {
                showToast('Anda harus menyetujui Syarat & Ketentuan', 'error');
                return;
            }

            submitBtn.disabled = true;
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<div class="spinner"></div><span>Mendaftar...</span>';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    nama: nama,
                    email: email,
                    telepon: telepon,
                    role: 'user',
                    status: 'aktif',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showToast('✅ Pendaftaran berhasil!', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (error) {
                console.error('Register error:', error);
                let message = 'Gagal mendaftar.';
                if (error.code === 'auth/email-already-in-use') {
                    message = 'Email sudah terdaftar. Silakan login.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Format email tidak valid.';
                } else if (error.code === 'auth/weak-password') {
                    message = 'Password terlalu lemah. Minimal 6 karakter.';
                } else if (error.code === 'auth/network-request-failed') {
                    message = 'Koneksi internet bermasalah. Periksa koneksi Anda.';
                }
                showToast(message, 'error');

                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        });

        // ============================================
        // GOOGLE REGISTER
        // ============================================
        document.getElementById('googleRegisterBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.innerHTML = '<div class="spinner"></div><span>Memuat...</span>';

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });

                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                const result = await auth.signInWithPopup(provider);
                console.log('✅ Google register success:', result.user);

                const userDoc = await db.collection('users').doc(result.user.uid).get();

                if (!userDoc.exists) {
                    await db.collection('users').doc(result.user.uid).set({
                        uid: result.user.uid,
                        nama: result.user.displayName || 'User',
                        email: result.user.email,
                        fotoUrl: result.user.photoURL || '',
                        role: 'user',
                        status: 'aktif',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('✅ User document created');
                }

                showToast('✅ Berhasil mendaftar dengan Google!', 'success');

                setTimeout(() => {
                    window.location.href = 'user/index.html';
                }, 1000);

            } catch (error) {
                console.error('❌ Google register error:', error);

                let message = 'Gagal mendaftar dengan Google.';
                if (error.code === 'auth/popup-closed-by-user') {
                    message = 'Popup ditutup. Silakan coba lagi.';
                } else if (error.code === 'auth/unauthorized-domain') {
                    message = '⚠️ Domain tidak diizinkan. Tambahkan domain di Firebase Console.';
                } else if (error.code === 'auth/operation-not-allowed') {
                    message = '⚠️ Google Sign-in belum diaktifkan.';
                } else if (error.code === 'auth/network-request-failed') {
                    message = '⚠️ Koneksi internet bermasalah.';
                } else if (error.code === 'auth/popup-blocked') {
                    message = '⚠️ Popup diblokir. Izinkan popup untuk situs ini.';
                } else if (error.code === 'auth/account-exists-with-different-credential') {
                    message = 'Akun dengan email ini sudah terdaftar dengan metode login lain.';
                }
                showToast(message, 'error');

                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg> Google`;
            }
        });
    </script>
</body>
</html>

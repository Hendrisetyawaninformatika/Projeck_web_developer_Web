<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk | WebDevPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f4f9;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        a {
            text-decoration: none;
        }
        button {
            cursor: pointer;
            font-family: inherit;
        }
        .auth-body {
            background: linear-gradient(135deg, #f0f4f9 0%, #e2e8f0 100%);
        }

        /* ===== AUTH CONTAINER ===== */
        .auth-container {
            display: flex;
            max-width: 1100px;
            width: 100%;
            min-height: 600px;
            margin: 20px;
            background: #fff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.12);
            transition: all 0.3s ease;
        }

        /* ===== LEFT SIDE - ANIMASI DEVELOPER ===== */
        .auth-left {
            flex: 1;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            padding: 48px 40px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }

        /* Animasi Background */
        .auth-left::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(245, 176, 20, 0.08) 0%, transparent 60%);
            animation: pulseGlow 6s ease-in-out infinite;
        }

        /* Animasi Bintang Jatuh */
        .auth-left .stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .auth-left .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: starFall linear infinite;
        }
        .auth-left .star:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .auth-left .star:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; width: 4px; height: 4px; }
        .auth-left .star:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; }
        .auth-left .star:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; width: 5px; height: 5px; }
        .auth-left .star:nth-child(5) { left: 70%; animation-duration: 9s; animation-delay: 3s; }
        .auth-left .star:nth-child(6) { left: 85%; animation-duration: 11s; animation-delay: 5s; width: 4px; height: 4px; }
        .auth-left .star:nth-child(7) { left: 50%; animation-duration: 13s; animation-delay: 7s; width: 6px; height: 6px; }

        @keyframes starFall {
            0% {
                transform: translateY(-20px) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(10px) translateX(5px) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(-20px) scale(0.5);
                opacity: 0;
            }
        }

        /* Animasi Developer Text */
        .developer-animation {
            position: relative;
            z-index: 1;
            text-align: center;
            margin: 20px 0;
        }
        .developer-animation .code-icon {
            font-size: 60px;
            display: inline-block;
            animation: floatCode 3s ease-in-out infinite;
        }
        @keyframes floatCode {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .developer-animation .typing-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 10px;
            border-right: 2px solid #f5b014;
            padding-right: 8px;
            display: inline-block;
            animation: blinkCursor 0.8s step-end infinite;
        }
        @keyframes blinkCursor {
            50% { border-color: transparent; }
        }

        /* Animasi Code Lines */
        .code-lines {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            margin-top: 10px;
        }
        .code-lines .line {
            height: 3px;
            background: linear-gradient(90deg, rgba(245, 176, 20, 0.6), rgba(245, 176, 20, 0.1));
            border-radius: 4px;
            animation: lineSlide 4s ease-in-out infinite;
        }
        .code-lines .line:nth-child(1) { width: 80%; animation-delay: 0s; }
        .code-lines .line:nth-child(2) { width: 60%; animation-delay: 0.8s; }
        .code-lines .line:nth-child(3) { width: 90%; animation-delay: 1.6s; }
        .code-lines .line:nth-child(4) { width: 50%; animation-delay: 2.4s; }
        .code-lines .line:nth-child(5) { width: 70%; animation-delay: 3.2s; }

        @keyframes lineSlide {
            0%, 100% { opacity: 0.3; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.05); }
        }

        .auth-left::after {
            content: '</>';
            position: absolute;
            font-size: 200px;
            opacity: 0.03;
            bottom: -60px;
            right: -30px;
            font-weight: 800;
            color: #f5b014;
            z-index: 0;
            animation: rotateCode 20s linear infinite;
        }
        @keyframes rotateCode {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auth-brand {
            position: relative;
            z-index: 1;
        }
        .auth-brand .logo {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
        }
        .auth-brand .logo span {
            color: #f5b014;
        }
        .auth-brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
        }

        .auth-left-bottom {
            position: relative;
            z-index: 1;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }
        .auth-left-bottom .features {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .auth-left-bottom .features span {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
        }
        .auth-left-bottom .features span:nth-child(1) { animation-delay: 0.2s; }
        .auth-left-bottom .features span:nth-child(2) { animation-delay: 0.4s; }
        .auth-left-bottom .features span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-left-bottom .features span svg {
            stroke: #f5b014;
        }

        /* ===== RIGHT SIDE ===== */
        .auth-right {
            flex: 1.2;
            padding: 48px 48px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .auth-form-wrapper {
            width: 100%;
            max-width: 420px;
        }
        .auth-form-wrapper h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .auth-form-wrapper h1 span {
            color: #f5b014;
        }
        .auth-form-wrapper > p {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 28px;
        }

        /* ===== FORM ===== */
        .auth-form .form-group {
            margin-bottom: 18px;
        }
        .auth-form .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .auth-form .form-group .required {
            color: #ef4444;
        }
        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon-wrapper svg:first-child {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            pointer-events: none;
            transition: color 0.3s;
        }
        .input-icon-wrapper input {
            width: 100%;
            padding: 12px 50px 12px 44px;
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            background: #fafcff;
            font-size: 14px;
            transition: all 0.25s;
            outline: none;
            font-family: inherit;
            color: #1e293b;
        }
        .input-icon-wrapper input:focus {
            border-color: #f5b014;
            box-shadow: 0 0 0 4px rgba(245, 176, 20, 0.12);
            background: #fff;
        }
        .input-icon-wrapper input:focus + svg {
            color: #f5b014;
        }
        .input-icon-wrapper input::placeholder {
            color: #94a3b8;
        }

        /* ===== TOGGLE PASSWORD ===== */
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #94a3b8;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .toggle-password:hover {
            color: #f5b014;
            background: rgba(245, 176, 20, 0.08);
        }
        .toggle-password.active {
            color: #f5b014;
        }

        /* ===== FORM OPTIONS ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 13px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #475569;
            font-weight: 500;
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #f5b014;
            border-radius: 4px;
            cursor: pointer;
        }
        .form-options a {
            color: #f5b014;
            font-weight: 600;
            transition: color 0.2s;
        }
        .form-options a:hover {
            color: #d49a0e;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s ease;
            font-family: inherit;
            text-decoration: none;
        }
        .btn-block {
            width: 100%;
        }
        .btn-lg {
            padding: 14px 28px;
            font-size: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f5b014, #d49a0e);
            color: #0f172a;
            box-shadow: 0 6px 20px rgba(245, 176, 20, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(245, 176, 20, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-google {
            background: #fff;
            color: #1e293b;
            border: 1.5px solid #e2e8f0;
            gap: 12px;
        }
        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .btn-google svg {
            flex-shrink: 0;
        }

        /* ===== DIVIDER ===== */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            color: #94a3b8;
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* ===== FOOTER ===== */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }
        .auth-footer a {
            color: #f5b014;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer a:hover {
            color: #d49a0e;
        }

        /* ===== SPINNER ===== */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== TOAST ===== */
        .alert-toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            animation: slideInRight 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        .alert-toast.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .alert-toast.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .alert-toast.hide {
            animation: slideOutRight 0.4s ease forwards;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .auth-container {
                flex-direction: column;
                max-width: 480px;
                min-height: auto;
                border-radius: 24px;
            }
            .auth-left {
                padding: 32px 28px 24px;
                min-height: 250px;
            }
            .developer-animation .code-icon {
                font-size: 40px;
            }
            .code-lines {
                display: none;
            }
            .auth-left .stars {
                display: none;
            }
            .auth-right {
                padding: 32px 28px 36px;
            }
            .auth-form-wrapper h1 {
                font-size: 24px;
            }
        }
        @media (max-width: 480px) {
            .auth-container {
                margin: 12px;
                border-radius: 20px;
            }
            .auth-left {
                padding: 20px 16px 16px;
                min-height: 180px;
            }
            .auth-right {
                padding: 24px 16px 28px;
            }
            .auth-brand .logo {
                font-size: 20px;
            }
            .auth-form-wrapper h1 {
                font-size: 20px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .developer-animation .code-icon {
                font-size: 30px;
            }
            .developer-animation .typing-text {
                font-size: 11px;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- ===== LEFT SIDE - ANIMASI DEVELOPER ===== -->
        <div class="auth-left">
            <!-- Stars Animation -->
            <div class="stars">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>

            <div class="auth-brand">
                <a href="index.html" class="logo">Web<span>Dev</span>Pro</a>
                <p>Solusi Digital Profesional untuk Bisnis Anda</p>
            </div>

            <!-- Developer Animation -->
            <div class="developer-animation">
                <div class="code-icon">💻</div>
                <div class="typing-text">Web Developer &amp; Designer</div>
                <div class="code-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>

            <div class="auth-left-bottom">
                <div class="features">
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12" /></svg>
                        Terpercaya
                    </span>
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
                        Aman
                    </span>
                    <span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></svg>
                        24/7 Support
                    </span>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT SIDE ===== -->
        <div class="auth-right">
            <div class="auth-form-wrapper">
                <h1>Selamat Datang <span>Kembali</span></h1>
                <p>Masuk ke akun Anda untuk melanjutkan</p>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <div class="input-icon-wrapper">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="email" placeholder="nama@email.com" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <div class="input-icon-wrapper">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>

                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" />
                            <span>Ingat saya</span>
                        </label>
                        <a href="lupa-password.html">Lupa password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginSubmit">
                        <span>Masuk</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                            <polyline points="10 17 15 12 10 7" />
                            <line x1="15" y1="12" x2="3" y2="12" />
                        </svg>
                    </button>
                </form>

                <div class="auth-divider"><span>atau masuk dengan</span></div>

                <button class="btn btn-google btn-block" id="googleLoginBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Google
                </button>

                <p class="auth-footer">
                    Belum punya akun? <a href="register.html">Daftar sekarang</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <script>
        // ============================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const isPasswordVisible = passwordInput.type === 'text';
            
            // Toggle input type
            passwordInput.type = isPasswordVisible ? 'password' : 'text';
            
            // Toggle icon
            const svg = this.querySelector('svg');
            if (passwordInput.type === 'text') {
                // Show "eye with slash" (password visible)
                svg.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                `;
                this.classList.add('active');
            } else {
                // Show "eye" (password hidden)
                svg.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                `;
                this.classList.remove('active');
            }
        });

        // ============================================
        // SHOW TOAST
        // ============================================
        function showToast(message, type = 'error') {
            const existing = document.querySelector('.alert-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `alert-toast ${type}`;
            const icons = { error: '❌', success: '✅', warning: '⚠️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // ============================================
        // LOGIN FORM
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('loginSubmit');

            if (!email || !password) {
                showToast('Email dan password wajib diisi!', 'warning');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Memuat...';

            try {
                const persistence = rememberMe ? 
                    firebase.auth.Auth.Persistence.LOCAL : 
                    firebase.auth.Auth.Persistence.SESSION;
                await auth.setPersistence(persistence);

                const userCredential = await auth.signInWithEmailAndPassword(email, password);

                const userDoc = await db.collection('users').doc(userCredential.user.uid).get();
                const userData = userDoc.data();

                if (!userData) {
                    showToast('Akun tidak ditemukan di database', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `
                        <span>Masuk</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                    `;
                    return;
                }

                if (rememberMe) {
                    localStorage.setItem('webdevpro_session', JSON.stringify({
                        uid: userCredential.user.uid,
                        email: userCredential.user.email,
                        role: userData.role || 'user'
                    }));
                }

                showToast('✅ Login berhasil!', 'success');

                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/index.html';
                    } else {
                        window.location.href = 'user/index.html';
                    }
                }, 500);

            } catch (error) {
                console.error('Login error:', error);
                let message = 'Gagal login. Periksa email dan password Anda.';
                if (error.code === 'auth/user-not-found') message = 'Email tidak terdaftar.';
                if (error.code === 'auth/wrong-password') message = 'Password salah.';
                if (error.code === 'auth/too-many-requests') message = 'Terlalu banyak percobaan. Coba lagi nanti.';
                if (error.code === 'auth/invalid-email') message = 'Format email tidak valid.';
                if (error.code === 'auth/user-disabled') message = 'Akun ini telah dinonaktifkan.';
                showToast(message, 'error');

                submitBtn.disabled = false;
                submitBtn.innerHTML = `
                    <span>Masuk</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                `;
            }
        });

        // ============================================
        // GOOGLE LOGIN
        // ============================================
        document.getElementById('googleLoginBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memuat...';

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                
                const result = await auth.signInWithPopup(provider);
                console.log('✅ Google login success:', result.user);

                const userDoc = await db.collection('users').doc(result.user.uid).get();

                if (!userDoc.exists) {
                    await db.collection('users').doc(result.user.uid).set({
                        uid: result.user.uid,
                        nama: result.user.displayName || 'User',
                        email: result.user.email,
                        fotoUrl: result.user.photoURL || '',
                        role: 'user',
                        status: 'aktif',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('✅ User document created');
                }

                const userData = userDoc.exists ? userDoc.data() : { role: 'user' };

                localStorage.setItem('webdevpro_session', JSON.stringify({
                    uid: result.user.uid,
                    email: result.user.email,
                    role: userData.role || 'user'
                }));

                showToast('✅ Login dengan Google berhasil!', 'success');

                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/index.html';
                    } else {
                        window.location.href = 'user/index.html';
                    }
                }, 1000);

            } catch (error) {
                console.error('❌ Google login error:', error);
                
                let message = 'Gagal login dengan Google.';
                if (error.code === 'auth/popup-closed-by-user') message = 'Popup ditutup. Silakan coba lagi.';
                else if (error.code === 'auth/unauthorized-domain') message = '⚠️ Domain tidak diizinkan.';
                else if (error.code === 'auth/operation-not-allowed') message = '⚠️ Google Sign-in belum diaktifkan.';
                else if (error.code === 'auth/network-request-failed') message = '⚠️ Koneksi internet bermasalah.';
                else if (error.code === 'auth/popup-blocked') message = '⚠️ Popup diblokir. Izinkan popup.';
                
                showToast(message, 'error');

                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg> Google`;
            }
        });

        // ============================================
        // CHECK SESSION
        // ============================================
        const session = JSON.parse(localStorage.getItem('webdevpro_session') || 'null');
        if (session) {
            window.location.href = session.role === 'admin' ? 'admin/index.html' : 'user/index.html';
        }

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const submitBtn = document.getElementById('loginSubmit');
                if (document.activeElement.tagName === 'INPUT' && !submitBtn.disabled) {
                    submitBtn.click();
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | WebDevPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card" style="text-align:center;">
        <div class="auth-logo">Web<span>Dev</span>Pro</div>
        <div style="font-size:3rem; margin-bottom:15px;">📧</div>
        <h2>Lupa Password?</h2>
        <p style="color:var(--gray); margin-bottom:25px;">Masukkan email Anda dan kami akan mengirimkan link reset password.</p>
        
        <form id="resetForm">
            <div class="form-group">
                <input type="email" class="form-control" id="resetEmail" placeholder="nama@email.com" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" style="justify-content:center;">
                Kirim Link Reset
            </button>
        </form>
        
        <div style="margin-top:25px;">
            <a href="login.html" style="color:var(--primary); text-decoration:none;">
                ← Kembali ke Login
            </a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            resetPassword(email);
        });
    </script>
</body>
</html>

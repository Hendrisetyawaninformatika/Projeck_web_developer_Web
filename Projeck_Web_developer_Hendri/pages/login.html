<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | WebDevPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config & Auth -->
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            padding: 16px;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particles span {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        .bg-particles span:nth-child(1) { left: 5%; animation-duration: 22s; animation-delay: 0s; width: 6px; height: 6px; background: rgba(245, 176, 20, 0.15); }
        .bg-particles span:nth-child(2) { left: 15%; animation-duration: 28s; animation-delay: 2s; width: 10px; height: 10px; background: rgba(245, 176, 20, 0.1); }
        .bg-particles span:nth-child(3) { left: 25%; animation-duration: 20s; animation-delay: 4s; width: 4px; height: 4px; background: rgba(255, 255, 255, 0.08); }
        .bg-particles span:nth-child(4) { left: 35%; animation-duration: 30s; animation-delay: 1s; width: 14px; height: 14px; background: rgba(245, 176, 20, 0.08); }
        .bg-particles span:nth-child(5) { left: 45%; animation-duration: 25s; animation-delay: 3s; width: 8px; height: 8px; background: rgba(255, 255, 255, 0.06); }
        .bg-particles span:nth-child(6) { left: 55%; animation-duration: 23s; animation-delay: 5s; width: 12px; height: 12px; background: rgba(245, 176, 20, 0.12); }
        .bg-particles span:nth-child(7) { left: 65%; animation-duration: 27s; animation-delay: 2.5s; width: 5px; height: 5px; background: rgba(255, 255, 255, 0.07); }
        .bg-particles span:nth-child(8) { left: 75%; animation-duration: 21s; animation-delay: 4.5s; width: 9px; height: 9px; background: rgba(245, 176, 20, 0.1); }
        .bg-particles span:nth-child(9) { left: 85%; animation-duration: 29s; animation-delay: 1.5s; width: 7px; height: 7px; background: rgba(255, 255, 255, 0.05); }
        .bg-particles span:nth-child(10) { left: 95%; animation-duration: 24s; animation-delay: 3.5s; width: 11px; height: 11px; background: rgba(245, 176, 20, 0.09); }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) rotate(36deg) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* ===== MAIN CONTAINER ===== */
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== HEADER ===== */
        .auth-header {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            padding: 24px 20px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(245, 176, 20, 0.06) 0%, transparent 60%);
            animation: pulseGlow 6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .auth-header .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
            position: relative;
            z-index: 1;
            display: inline-block;
            letter-spacing: -0.5px;
        }

        .auth-header .logo span {
            color: #f5b014;
        }

        .auth-header .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            font-weight: 400;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }

        .auth-header .header-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }

        /* ===== FORM BODY ===== */
        .auth-body {
            padding: 24px 20px 20px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-header .badge {
            display: inline-block;
            background: rgba(245, 176, 20, 0.1);
            color: #f5b014;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
            animation: pulseBadge 2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .form-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .form-header h1 span {
            color: #f5b014;
        }

        .form-header p {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* ===== FORM ===== */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .form-group label .required {
            color: #ef4444;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            color: #94a3b8;
            pointer-events: none;
            transition: color 0.3s ease;
            z-index: 1;
            width: 16px;
            height: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 38px 10px 38px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-size: 13px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
            color: #1e293b;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-wrapper input:focus {
            border-color: #f5b014;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(245, 176, 20, 0.1);
        }

        .input-wrapper input:focus ~ .input-icon {
            color: #f5b014;
        }

        .input-wrapper input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .input-wrapper input.success {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
            font-size: 12px;
        }

        .input-error {
            font-size: 0.65rem;
            color: #ef4444;
            margin-top: 2px;
            display: none;
        }

        .input-error.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* ===== TOGGLE PASSWORD ===== */
        .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            color: #94a3b8;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1;
            touch-action: manipulation;
        }

        .toggle-password:hover,
        .toggle-password:active {
            color: #f5b014;
            background: rgba(245, 176, 20, 0.08);
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 40px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f5b014, #d49a0e);
            color: #0f172a;
            box-shadow: 0 4px 16px rgba(245, 176, 20, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 176, 20, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .btn-icon {
            width: 16px;
            height: 16px;
        }

        /* ===== DIVIDER ===== */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
            color: #94a3b8;
            font-size: 0.7rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* ===== GOOGLE BUTTON ===== */
        .btn-google {
            background: white;
            color: #1e293b;
            border: 2px solid #e2e8f0;
            font-weight: 500;
            gap: 8px;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .btn-google:active {
            transform: scale(0.97);
            background: #f1f5f9;
        }

        .btn-google:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ===== FOOTER ===== */
        .auth-footer {
            text-align: center;
            margin-top: 14px;
            color: #64748b;
            font-size: 0.8rem;
        }

        .auth-footer a {
            color: #f5b014;
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover,
        .auth-footer a:active {
            text-decoration: underline;
        }

        /* ===== SPINNER ===== */
        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid rgba(15, 23, 42, 0.2);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 13px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90%;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        .toast .toast-icon {
            font-size: 18px;
        }

        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 14px;
        }

        .loading-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-overlay .spinner-large {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(245, 176, 20, 0.2);
            border-top-color: #f5b014;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            color: white;
            font-size: 14px;
            font-weight: 400;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .auth-container { border-radius: 20px; }
            .auth-header { padding: 18px 16px 16px; }
            .auth-header .logo { font-size: 1.3rem; }
            .auth-header .header-icon { font-size: 28px; }
            .auth-header .subtitle { font-size: 0.7rem; }
            .auth-body { padding: 18px 16px 16px; }
            .form-header h1 { font-size: 1.2rem; }
            .form-header p { font-size: 0.75rem; }
            .input-wrapper input { padding: 9px 34px 9px 34px; font-size: 12px; border-radius: 8px; }
            .input-wrapper .input-icon { left: 10px; width: 14px; height: 14px; }
            .btn { padding: 10px 14px; font-size: 12px; border-radius: 30px; }
            .auth-footer { font-size: 0.7rem; margin-top: 12px; }
            .toast { font-size: 11px; padding: 8px 14px; top: 10px; }
        }
    </style>
</head>
<body>
    <!-- ===== BACKGROUND PARTICLES ===== -->
    <div class="bg-particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- ===== LOADING OVERLAY ===== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-large"></div>
        <p id="loadingText">Memproses login...</p>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast">
        <span class="toast-icon" id="toastIcon">✅</span>
        <span id="toastMessage">Success</span>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="auth-container">
        <!-- ===== HEADER ===== -->
        <div class="auth-header">
            <span class="header-icon">🔐</span>
            <a href="../index.html" class="logo">Web<span>Dev</span>Pro</a>
            <p class="subtitle">Masuk ke akun Anda</p>
        </div>

        <!-- ===== BODY ===== -->
        <div class="auth-body">
            <div class="form-header">
                <span class="badge">👋 Selamat Datang Kembali</span>
                <h1>Login ke <span>Akun</span></h1>
                <p>Masukkan email dan password untuk melanjutkan</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email" inputmode="email">
                    </div>
                    <div class="input-error" id="emailError">Format email tidak valid</div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="input-error" id="passwordError">Password wajib diisi</div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h6v6" />
                        <path d="M10 14L21 3" />
                        <path d="M18 13v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h8" />
                    </svg>
                    Login
                </button>

                <!-- Divider -->
                <div class="auth-divider">atau masuk dengan</div>

                <!-- Google Button -->
                <button type="button" class="btn btn-google" id="googleBtn">
                    <svg viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Google
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    // DOM REFS
    // ============================================================
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const toggleBtn = document.getElementById('togglePassword');
    const loginBtn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');

    let toastTimeout = null;

    // ============================================================
    // TOAST SYSTEM
    // ============================================================
    function showToast(message, type = 'success') {
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toastIcon.textContent = icons[type] || '📢';
        toastMessage.textContent = message;
        toast.className = `toast toast-${type}`;
        void toast.offsetWidth;
        toast.classList.add('show');

        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 4500);
    }

    // ============================================================
    // LOADING OVERLAY
    // ============================================================
    function showLoading(text = 'Memproses login...') {
        loadingText.textContent = text;
        loadingOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function hideLoading() {
        loadingOverlay.classList.remove('show');
        document.body.style.overflow = '';
    }

    // ============================================================
    // TOGGLE PASSWORD
    // ============================================================
    toggleBtn.addEventListener('click', function() {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        const svg = this.querySelector('svg');
        if (type === 'text') {
            svg.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
            `;
        } else {
            svg.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
            `;
        }
        password.focus();
    });

    // ============================================================
    // VALIDATION
    // ============================================================
    function validateEmail(emailStr) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailStr);
    }

    function setError(el, errorEl, message) {
        el.classList.add('error');
        el.classList.remove('success');
        errorEl.textContent = message || errorEl.textContent;
        errorEl.classList.add('show');
    }

    function setSuccess(el, errorEl) {
        el.classList.remove('error');
        el.classList.add('success');
        errorEl.classList.remove('show');
    }

    email.addEventListener('blur', function() {
        if (this.value.trim() === '') {
            setError(this, emailError, 'Email wajib diisi');
        } else if (!validateEmail(this.value)) {
            setError(this, emailError, 'Format email tidak valid');
        } else {
            setSuccess(this, emailError);
        }
    });

    password.addEventListener('blur', function() {
        if (this.value.length === 0) {
            setError(this, passwordError, 'Password wajib diisi');
        } else {
            setSuccess(this, passwordError);
        }
    });

    email.addEventListener('focus', function() {
        this.classList.remove('error', 'success');
        emailError.classList.remove('show');
    });

    password.addEventListener('focus', function() {
        this.classList.remove('error', 'success');
        passwordError.classList.remove('show');
    });

    // ============================================================
    // LOGIN FUNCTION
    // ============================================================
    async function loginUser(emailVal, passVal) {
        try {
            const userCredential = await firebase.auth().signInWithEmailAndPassword(emailVal, passVal);
            const user = userCredential.user;

            // Get user data from Firestore
            try {
                const docRef = firebase.firestore().collection('users').doc(user.uid);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    // If user document doesn't exist, create one
                    await docRef.set({
                        nama: user.displayName || 'Pengguna',
                        email: user.email,
                        role: 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        uid: user.uid,
                        photoURL: user.photoURL || null
                    });
                    return 'user';
                }

                const userData = docSnap.data();
                return userData.role || 'user';
            } catch (firestoreError) {
                console.warn('Firestore error, but user is authenticated:', firestoreError);
                return 'user';
            }
        } catch (error) {
            throw error;
        }
    }

    // ============================================================
    // FORM SUBMISSION
    // ============================================================
    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Validate
        let isValid = true;

        if (email.value.trim() === '' || !validateEmail(email.value)) {
            setError(email, emailError, 'Email valid wajib diisi');
            isValid = false;
        } else {
            setSuccess(email, emailError);
        }

        if (password.value.length === 0) {
            setError(password, passwordError, 'Password wajib diisi');
            isValid = false;
        } else {
            setSuccess(password, passwordError);
        }

        if (!isValid) {
            const firstError = form.querySelector('.input-error.show');
            if (firstError) {
                const input = firstError.closest('.form-group')?.querySelector('input');
                if (input) input.focus();
            }
            return;
        }

        // Disable button
        loginBtn.disabled = true;
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<span class="spinner"></span> Memproses...';

        showLoading('Memproses login...');

        try {
            const role = await loginUser(email.value.trim(), password.value);

            hideLoading();
            showToast('✅ Login berhasil!', 'success');

            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = 'dashboard-admin.html';
                } else {
                    window.location.href = '../index.html';
                }
            }, 1500);

        } catch (error) {
            hideLoading();
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;

            console.error('Login error:', error);

            let msg = 'Terjadi kesalahan. Silakan coba lagi.';
            if (error.code === 'auth/user-not-found') {
                msg = 'Email tidak terdaftar. Silakan daftar terlebih dahulu.';
                setError(email, emailError, msg);
            } else if (error.code === 'auth/wrong-password') {
                msg = 'Password salah. Silakan coba lagi.';
                setError(password, passwordError, msg);
            } else if (error.code === 'auth/invalid-email') {
                msg = 'Format email tidak valid.';
                setError(email, emailError, msg);
            } else if (error.code === 'auth/too-many-requests') {
                msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
            } else if (error.code === 'auth/network-request-failed') {
                msg = 'Koneksi internet bermasalah. Periksa koneksi Anda.';
            } else if (error.code === 'auth/user-disabled') {
                msg = 'Akun Anda telah dinonaktifkan. Hubungi admin.';
            }
            showToast(msg, 'error');
        }
    });

    // ============================================================
    // GOOGLE SIGN-IN
    // ============================================================
    googleBtn.addEventListener('click', async function() {
        googleBtn.disabled = true;
        const originalText = googleBtn.innerHTML;
        googleBtn.innerHTML = '<span class="spinner"></span> Memproses...';

        showLoading('Memproses Google...');

        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            const result = await firebase.auth().signInWithPopup(provider);
            const user = result.user;

            // Check user role
            const docRef = firebase.firestore().collection('users').doc(user.uid);
            const docSnap = await docRef.get();

            let role = 'user';
            if (!docSnap.exists) {
                await docRef.set({
                    nama: user.displayName || 'Pengguna Google',
                    email: user.email,
                    role: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    uid: user.uid,
                    photoURL: user.photoURL || null
                });
            } else {
                role = docSnap.data().role || 'user';
            }

            hideLoading();
            showToast('✅ Login dengan Google berhasil!', 'success');

            googleBtn.disabled = false;
            googleBtn.innerHTML = originalText;

            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = 'dashboard-admin.html';
                } else {
                    window.location.href = '../index.html';
                }
            }, 1500);

        } catch (error) {
            hideLoading();
            googleBtn.disabled = false;
            googleBtn.innerHTML = originalText;

            console.error('Google sign-in error:', error);

            if (error.code === 'auth/popup-closed-by-user') {
                showToast('Pop-up ditutup sebelum selesai.', 'warning');
            } else if (error.code === 'auth/popup-blocked') {
                showToast('Pop-up diblokir. Izinkan pop-up untuk melanjutkan.', 'warning');
            } else {
                showToast('Gagal login dengan Google. Coba lagi.', 'error');
            }
        }
    });

    // ============================================================
    // KEYBOARD: Enter to submit
    // ============================================================
    form.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
            e.preventDefault();
            if (!loginBtn.disabled) {
                form.dispatchEvent(new Event('submit'));
            }
        }
    });

    // ============================================================
    // AUTO REDIRECT IF ALREADY LOGGED IN
    // ============================================================
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const docRef = firebase.firestore().collection('users').doc(user.uid);
                const docSnap = await docRef.get();
                const role = docSnap.exists ? docSnap.data().role : 'user';

                const currentPath = window.location.pathname;
                if (role === 'admin' && !currentPath.includes('dashboard-admin.html')) {
                    window.location.href = 'dashboard-admin.html';
                } else if (role === 'user' && !currentPath.includes('index.html')) {
                    window.location.href = '../index.html';
                }
            } catch (error) {
                console.error('Error checking user role:', error);
            }
        }
    });

    console.log('✅ Login page loaded successfully!');
    </script>
</body>
</html>
